server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

# JWT secret — must match the secret used when tokens are issued
# In real production this would come from a secrets manager (AWS Secrets Manager etc.)
jwt:
  secret: smartbank-super-secret-key-must-be-at-least-256-bits-long-for-HS256

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.smartbank: DEBUG
    org.springframework.cloud.gateway: DEBUG
